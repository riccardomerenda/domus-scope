name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, lint, test
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --filter @domus-scope/web exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm --filter @domus-scope/web e2e
