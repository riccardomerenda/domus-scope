<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DomusScope — a local-first decision lab for the rent vs. buy question. Your data never leaves this device."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0b0b'/%3E%3Cpath d='M16 7 6 15h3v9h6v-6h2v6h6v-9h3z' fill='%23fcfcfb'/%3E%3C/svg%3E"
    />
    <title>DomusScope</title>
    <script>
      // Apply the theme before first paint to avoid a flash.
      (function () {
        var stored = localStorage.getItem("ds-theme");
        var dark =
          stored === "dark" ||
          (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
